name: mailzen-coolify

# =============================================================================
# MailZen – Coolify Docker Compose deployment
# -----------------------------------------------------------------------------
# This compose file is designed for Coolify (Traefik-based reverse proxy).
# KEY DIFFERENCES from deploy/ec2/docker-compose.yml:
#   • No Caddy service — Coolify's built-in Traefik handles TLS + routing.
#   • Services use Traefik labels for domain routing instead of Caddy config.
#   • Ports are NOT bound to host (only Traefik accesses them via the network).
#   • NEXT_PUBLIC_* vars passed as build.args so Next.js bakes them in.
#   • context: . (repo root) — Coolify sets --project-directory to repo root,
#     so relative paths must be from repo root, NOT from this file's location.
#   • No env_file — Coolify injects all env vars directly at runtime.
# =============================================================================

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: mailzen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mailzen
      POSTGRES_USER: mailzen_user
      POSTGRES_PASSWORD: mailzen_secure_pass_123
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mailzen-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailzen_user -d mailzen"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mailzen-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - mailzen-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── AI Agent Platform (Python / FastAPI) ────────────────────────────────────

  ai-agent-platform:
    build:
      context: .
      dockerfile: services/ai-agent-platform/Dockerfile
    container_name: mailzen-ai-agent-platform
    restart: unless-stopped
    environment:
      AGENT_PLATFORM_INBOUND_API_KEY: ${AI_AGENT_PLATFORM_KEY}
      AGENT_PLATFORM_SERVICE_NAME: ai-agent-platform
      AGENT_PLATFORM_API_VERSION: v1
      AGENT_PLATFORM_DEFAULT_LOCALE: ${AGENT_PLATFORM_DEFAULT_LOCALE:-en-IN}
      AGENT_PLATFORM_MAX_MESSAGE_CHARS: ${AGENT_PLATFORM_MAX_MESSAGE_CHARS:-3000}
      AGENT_PLATFORM_AGENT_LLM_PROVIDER: ${AGENT_PLATFORM_AGENT_LLM_PROVIDER:-rule_based}
      AGENT_PLATFORM_AGENT_LLM_API_KEY: ${AGENT_PLATFORM_AGENT_LLM_API_KEY:-}
      AGENT_PLATFORM_AGENT_LLM_MODEL: ${AGENT_PLATFORM_AGENT_LLM_MODEL:-}
    networks:
      - mailzen-internal
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; status=urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=3).getcode(); sys.exit(0 if 200 <= status < 400 else 1)",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Backend (NestJS / GraphQL) ───────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: mailzen-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-agent-platform:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4000"
      FRONTEND_URL: https://${MAILZEN_DOMAIN}
      DATABASE_URL: postgresql://mailzen_user:mailzen_secure_pass_123@postgres:5432/mailzen
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AI_AGENT_PLATFORM_URL: http://ai-agent-platform:8100
      AI_AGENT_PLATFORM_REQUIRED: "false"
      MAILZEN_SESSION_COOKIE_SECURE: "true"
      MAILZEN_SESSION_COOKIE_SAMESITE: lax
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400}
      REFRESH_TTL_SECONDS: ${REFRESH_TTL_SECONDS:-2592000}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET}
      SECRETS_KEY: ${SECRETS_KEY}
      PROVIDER_SECRETS_KEYRING: ${PROVIDER_SECRETS_KEYRING}
      PROVIDER_SECRETS_ACTIVE_KEY_ID: ${PROVIDER_SECRETS_ACTIVE_KEY_ID:-default}
      TYPEORM_SYNCHRONIZE: "false"
      TYPEORM_RUN_MIGRATIONS: "true"
      TYPEORM_POOL_MAX: ${TYPEORM_POOL_MAX:-20}
      TYPEORM_IDLE_TIMEOUT_MS: ${TYPEORM_IDLE_TIMEOUT_MS:-30000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_PROVIDER_REDIRECT_URI: ${GOOGLE_PROVIDER_REDIRECT_URI:-}
      OUTLOOK_CLIENT_ID: ${OUTLOOK_CLIENT_ID:-}
      OUTLOOK_CLIENT_SECRET: ${OUTLOOK_CLIENT_SECRET:-}
      OUTLOOK_REDIRECT_URI: ${OUTLOOK_REDIRECT_URI:-}
      OUTLOOK_PROVIDER_REDIRECT_URI: ${OUTLOOK_PROVIDER_REDIRECT_URI:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMART_REPLY_USE_OPENAI: ${SMART_REPLY_USE_OPENAI:-false}
      SMART_REPLY_OPENAI_API_KEY: ${SMART_REPLY_OPENAI_API_KEY:-}
      SMART_REPLY_USE_ANTHROPIC: ${SMART_REPLY_USE_ANTHROPIC:-false}
      SMART_REPLY_ANTHROPIC_API_KEY: ${SMART_REPLY_ANTHROPIC_API_KEY:-}
      ENABLE_AI_AUTO_CLASSIFY: ${ENABLE_AI_AUTO_CLASSIFY:-false}
      MAILZEN_SMS_PROVIDER: ${MAILZEN_SMS_PROVIDER:-console}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      AI_AGENT_PLATFORM_KEY: ${AI_AGENT_PLATFORM_KEY}
    networks:
      - mailzen-internal
      - coolify
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/health', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.mailzen-api.rule=Host(`${MAILZEN_DOMAIN}`) && (PathPrefix(`/graphql`) || PathPrefix(`/auth`) || PathPrefix(`/email-integration`) || PathPrefix(`/notifications`) || PathPrefix(`/mailbox`) || PathPrefix(`/gmail-sync`) || PathPrefix(`/outlook-sync`) || PathPrefix(`/billing`) || PathPrefix(`/phone`) || PathPrefix(`/health`))"
      - "traefik.http.routers.mailzen-api.entrypoints=https"
      - "traefik.http.routers.mailzen-api.tls=true"
      - "traefik.http.routers.mailzen-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mailzen-api.service=mailzen-api-svc"
      - "traefik.http.services.mailzen-api-svc.loadbalancer.server.port=4000"
      - "traefik.http.routers.mailzen-api.priority=10"

  # ── Frontend (Next.js dashboard) ─────────────────────────────────────────────

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # IMPORTANT: Set these as Build Variables in Coolify UI (not just env vars).
        # Next.js bakes NEXT_PUBLIC_* into the JS bundle at build time.
        NEXT_PUBLIC_GRAPHQL_ENDPOINT: ${NEXT_PUBLIC_GRAPHQL_ENDPOINT}
        NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED:-true}
        NEXT_PUBLIC_ENABLE_EMAIL_WARMUP: ${NEXT_PUBLIC_ENABLE_EMAIL_WARMUP:-true}
        NEXT_PUBLIC_ENABLE_SMART_REPLIES: ${NEXT_PUBLIC_ENABLE_SMART_REPLIES:-true}
        NEXT_PUBLIC_ENABLE_EMAIL_TRACKING: ${NEXT_PUBLIC_ENABLE_EMAIL_TRACKING:-true}
        NEXT_PUBLIC_DEFAULT_THEME: ${NEXT_PUBLIC_DEFAULT_THEME:-system}
    container_name: mailzen-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
    networks:
      - mailzen-internal
      - coolify
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.mailzen-frontend.rule=Host(`${MAILZEN_DOMAIN}`)"
      - "traefik.http.routers.mailzen-frontend.entrypoints=https"
      - "traefik.http.routers.mailzen-frontend.tls=true"
      - "traefik.http.routers.mailzen-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mailzen-frontend.service=mailzen-frontend-svc"
      - "traefik.http.routers.mailzen-frontend.priority=1"
      - "traefik.http.services.mailzen-frontend-svc.loadbalancer.server.port=3000"

  # ── Marketing site (Next.js www subdomain) ───────────────────────────────────

  marketing:
    build:
      context: .
      dockerfile: apps/marketing/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.mailzen.email}
    container_name: mailzen-marketing
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
    networks:
      - mailzen-internal
      - coolify
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001/', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.mailzen-marketing.rule=Host(`www.${MAILZEN_DOMAIN}`)"
      - "traefik.http.routers.mailzen-marketing.entrypoints=https"
      - "traefik.http.routers.mailzen-marketing.tls=true"
      - "traefik.http.routers.mailzen-marketing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mailzen-marketing.service=mailzen-marketing-svc"
      - "traefik.http.services.mailzen-marketing-svc.loadbalancer.server.port=3001"

networks:
  mailzen-internal:
    driver: bridge
  # Coolify's Traefik network — created automatically by Coolify.
  # If testing manually outside Coolify: docker network create coolify
  coolify:
    external: true

volumes:
  postgres_data:
  redis_data:
