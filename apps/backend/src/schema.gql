input EmailFilterInput {
  search: String
  folder: String
  labelIds: [String!]
  status: String
  isStarred: Boolean
  providerId: String
}

input EmailSortInput {
  field: String!
  direction: String!
}

input SmartReplyInput {
  conversation: String!
}

type Mutation {
  createUser(createUserInput: CreateUserInput!): User!
  updateUser(updateUserInput: UpdateUserInput!): User!
  updateAutoSendTier(tier: String!): User!
  sendEmail(input: SendEmailInput!): Email!
  markEmailRead(markEmailReadInput: MarkEmailReadInput!): Email!
  sendRealEmail(createEmailInput: CreateEmailInput!): SendRealEmailResponse!
  createEmailFilter(input: CreateEmailFilterInput!): Boolean!
  deleteEmailFilter(id: String!): Boolean!
  createEmailTemplate(input: CreateEmailTemplateInput!): EmailTemplate!
  updateEmailTemplate(id: String!, input: UpdateEmailTemplateInput!): EmailTemplate!
  deleteEmailTemplate(id: String!): EmailTemplate!
  uploadAttachment(input: CreateAttachmentInput!): Attachment!
  deleteAttachment(input: DeleteAttachmentInput!): Boolean!
  startEmailWarmup(input: StartWarmupInput!): EmailWarmup!
  pauseEmailWarmup(input: PauseWarmupInput!): EmailWarmup!
  adjustWarmupStrategy(warmupId: String!): EmailWarmup!

  """
  Downgrade current user to the FREE plan. Upgrading to a paid plan requires createStripeCheckoutSession or createRazorpayCheckoutSession.
  """
  selectMyPlan(planCode: String!): UserSubscription!

  """Record a plan-upgrade intent for current user"""
  requestMyPlanUpgrade(targetPlanCode: String!, note: String): BillingUpgradeIntentResponse!

  """Create a Stripe Checkout session URL for upgrading to a paid plan"""
  createStripeCheckoutSession(planCode: String!, successUrl: String!, cancelUrl: String!): StripeCheckoutSessionResponse!

  """
  Create a Razorpay subscription checkout URL for upgrading to a paid plan
  """
  createRazorpayCheckoutSession(planCode: String!, successUrl: String!, cancelUrl: String!): RazorpayCheckoutResponse!

  """Start trial for an active paid plan"""
  startMyPlanTrial(planCode: String!, trialDays: Float): UserSubscription!

  """Purge expired billing compliance data by retention policy"""
  purgeBillingRetentionData(webhookRetentionDays: Float, aiUsageRetentionMonths: Float): BillingRetentionPurgeResponse!

  """Ingest provider billing webhook payload (admin-only replay endpoint)"""
  ingestBillingWebhook(provider: String!, eventType: String!, externalEventId: String!, payloadJson: String): BillingWebhookEvent!

  """Mark a notification as read"""
  markNotificationRead(id: String!): UserNotification!

  """Mark notifications as read for current user with optional filters"""
  markMyNotificationsRead(workspaceId: String, sinceHours: Int, types: [String!]): Int!

  """Update notification preferences"""
  updateMyNotificationPreferences(input: UpdateNotificationPreferencesInput!): UserNotificationPreference!

  """Register or refresh current user push subscription"""
  registerMyNotificationPushSubscription(input: RegisterNotificationPushSubscriptionInput!): NotificationPushSubscription!

  """Deactivate push subscription for current user"""
  unregisterMyNotificationPushSubscription(endpoint: String!): Boolean!

  """Purge expired notification data using configured retention policy"""
  purgeNotificationRetentionData(notificationRetentionDays: Int, disabledPushRetentionDays: Int): NotificationRetentionPurgeResponse!
  configureEmailProvider(providerInput: EmailProviderInput!): EmailProvider!
  deleteProvider(input: DeleteProviderInput!): Boolean!
